name: Android Instrumented Matrix

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  connected-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [26, 30, 34]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Prepare google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            cat > app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "0",
              "project_id": "nulvex-ci",
              "storage_bucket": "nulvex-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:0:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.androidircx.nulvex"
                  }
                },
                "api_key": [
                  {
                    "current_key": "dummy"
                  }
                ]
              }
            ],
            "configuration_version": "1"
          }
          JSON
          fi

      - name: Run connected Android tests (API ${{ matrix.api-level }})
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.androidircx.nulvex.data.VaultServiceImportTest,com.androidircx.nulvex.security.VaultAuthServiceTest,com.androidircx.nulvex.security.PanicWipeServiceTest --no-daemon --stacktrace

      - name: Upload connected test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: connected-tests-api-${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests
            app/build/outputs/androidTest-results
          if-no-files-found: warn
